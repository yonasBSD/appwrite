name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_FILE: docker-compose.yml
  IMAGE: appwrite-dev
  K6_IMAGE: grafana/k6:0.53.0

on:
  pull_request:
  workflow_dispatch:
    inputs:
      response_format:
        description: 'Response format version to test (e.g., 1.5.0, 1.4.0)'
        required: false
        type: string
        default: ''

jobs:
  dependencies:
    name: Checks / Dependencies
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      security-events: write
      contents: read
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3"

  security:
    name: Checks / Image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build the Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pr_image:${{ github.sha }}
          target: production

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'pr_image:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner on source code
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-setup-trivy: true

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image-results.sarif') != ''
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'

      - name: Upload source code scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-source'

  composer:
    name: Checks / Composer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Validate
        run: composer validate

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-reqs

      - name: Audit
        env:
          COMPOSER_NO_AUDIT: 0
        run: composer audit

  format:
    name: Checks / Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - run: git checkout HEAD^2
        if: github.event_name == 'pull_request'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-reqs

      - name: Run Linter
        run: composer lint

  analyze:
    name: Checks / Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-reqs

      - name: Cache PHPStan result cache
        uses: actions/cache@v4
        with:
          path: .phpstan-cache
          key: phpstan-${{ github.sha }}
          restore-keys: |
            phpstan-

      - name: Run PHPStan
        run: composer analyze -- --no-progress

  specs:
    name: Checks / Specs
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: swoole
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-reqs

      - name: Generate specs
        run: _APP_STORAGE_LIMIT=5368709120 php app/cli.php specs --version=latest --git=no

  locale:
    name: Checks / Locale
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Locale check
        run: node .github/workflows/static-analysis/locale/index.js

  matrix:
    name: Tests / Matrix
    runs-on: ubuntu-latest
    outputs:
      databases: ${{ steps.generate.outputs.databases }}
      modes: ${{ steps.generate.outputs.modes }}
    steps:
      - name: Generate matrix
        id: generate
        uses: actions/github-script@v8
        with:
          script: |
            const allDatabases = ['MariaDB', 'PostgreSQL', 'MongoDB'];
            const allModes = ['dedicated', 'shared'];

            const defaultDatabases = ['MongoDB'];
            const defaultModes = ['dedicated'];

            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput('databases', JSON.stringify(allDatabases));
              core.setOutput('modes', JSON.stringify(allModes));
              return;
            }

            const getContent = (ref) => github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'composer.lock',
              ref,
            });

            const getDbVersion = (lock) => lock.packages?.find(p => p.name === 'utopia-php/database')?.version;

            const [{ data: base }, { data: head }] = await Promise.all([
              getContent(pr.base.sha),
              getContent(pr.head.sha),
            ]);

            const decode = (content) => JSON.parse(Buffer.from(content, 'base64').toString());
            const databaseChanged = getDbVersion(decode(base.content)) !== getDbVersion(decode(head.content));

            core.setOutput('databases', JSON.stringify(databaseChanged ? allDatabases : defaultDatabases));
            core.setOutput('modes', JSON.stringify(databaseChanged ? allModes : defaultModes));

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Appwrite
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/${{ env.IMAGE }}.tar
          target: development
          build-args: |
            DEBUG=false
            TESTING=true
            VERSION=dev

      - name: Upload Docker Image
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.IMAGE }}
          path: /tmp/${{ env.IMAGE }}.tar
          retention-days: 1

  unit:
    name: Tests / Unit
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Download Docker Image
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.IMAGE }}
          path: /tmp

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load and Start Appwrite
        timeout-minutes: 5
        run: |
          docker load --input /tmp/${{ env.IMAGE }}.tar
          docker compose pull --quiet --ignore-buildable
          docker compose up -d --quiet-pull --wait

      - name: Environment Variables
        run: docker compose exec -T appwrite vars

      - name: Run Unit Tests
        uses: itznotabug/php-retry@v3
        with:
          max_attempts: 2
          retry_wait_seconds: 60
          timeout_minutes: 15
          job_id: ${{ job.check_run_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          test_dir: tests/unit
          command: >-
            docker compose exec
            -e _APP_E2E_RESPONSE_FORMAT="${{ github.event.inputs.response_format }}"
            appwrite test /usr/src/code/tests/unit

  e2e_general:
    name: Tests / E2E / General
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Download Docker Image
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.IMAGE }}
          path: /tmp

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load and Start Appwrite
        timeout-minutes: 5
        run: |
          docker load --input /tmp/${{ env.IMAGE }}.tar
          docker compose pull --quiet --ignore-buildable
          docker compose up -d --quiet-pull --wait

      - name: Wait for Open Runtimes
        timeout-minutes: 3
        run: |
          while ! docker compose logs openruntimes-executor | grep -q "Executor is ready."; do
            echo "Waiting for Executor to come online"
            sleep 1
          done

      - name: Run General Tests
        uses: itznotabug/php-retry@v3
        with:
          max_attempts: 2
          retry_wait_seconds: 60
          timeout_minutes: 15
          job_id: ${{ job.check_run_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          test_dir: tests/e2e/General
          command: >-
            docker compose exec -T
            -e _APP_E2E_RESPONSE_FORMAT="${{ github.event.inputs.response_format }}"
            appwrite test /usr/src/code/tests/e2e/General

      - name: Failure Logs
        if: failure()
        run: |
          echo "=== Appwrite Logs ==="
          docker compose logs

  e2e_service:
    name: Tests / E2E / ${{ matrix.database }} (${{ matrix.mode }}) / ${{ matrix.service }}
    runs-on: ${{ matrix.runner || 'ubuntu-latest' }}
    needs: [build, matrix]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        database: ${{ fromJSON(needs.matrix.outputs.databases) }}
        mode: ${{ fromJSON(needs.matrix.outputs.modes) }}
        service: [
          Account,
          Avatars,
          Console,
          Databases,
          TablesDB,
          Functions,
          FunctionsSchedule,
          GraphQL,
          Health,
          Locale,
          Projects,
          Realtime,
          Sites,
          Proxy,
          Storage,
          Tokens,
          Teams,
          Users,
          ProjectWebhooks,
          Webhooks,
          VCS,
          Messaging,
          Migrations,
          Project
        ]
        include:
          - service: Databases
            runner: blacksmith-4vcpu-ubuntu-2404
          - service: Sites
            runner: blacksmith-4vcpu-ubuntu-2404
          - service: Functions
            runner: blacksmith-4vcpu-ubuntu-2404
          - service: Avatars
            runner: blacksmith-4vcpu-ubuntu-2404
          - service: Realtime
            runner: blacksmith-4vcpu-ubuntu-2404
          - service: TablesDB
            runner: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Docker Image
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.IMAGE }}
          path: /tmp

      - name: Set database environment
        run: |
          if [ "${{ matrix.database }}" = "MariaDB" ]; then
            echo "COMPOSE_PROFILES=mariadb" >> $GITHUB_ENV
            echo "_APP_DB_ADAPTER=mariadb" >> $GITHUB_ENV
            echo "_APP_DB_HOST=mariadb" >> $GITHUB_ENV
            echo "_APP_DB_PORT=3306" >> $GITHUB_ENV
          elif [ "${{ matrix.database }}" = "MongoDB" ]; then
            echo "COMPOSE_PROFILES=mongodb" >> $GITHUB_ENV
            echo "_APP_DB_ADAPTER=mongodb" >> $GITHUB_ENV
            echo "_APP_DB_HOST=mongodb" >> $GITHUB_ENV
            echo "_APP_DB_PORT=27017" >> $GITHUB_ENV
          elif [ "${{ matrix.database }}" = "PostgreSQL" ]; then
            echo "COMPOSE_PROFILES=postgresql" >> $GITHUB_ENV
            echo "_APP_DB_ADAPTER=postgresql" >> $GITHUB_ENV
            echo "_APP_DB_HOST=postgresql" >> $GITHUB_ENV
            echo "_APP_DB_PORT=5432" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load and Start Appwrite
        timeout-minutes: 5
        env:
          _APP_BROWSER_HOST: http://invalid-browser/v1
          _APP_DATABASE_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'database_db_main' || '' }}
          _APP_DATABASE_DOCUMENTSDB_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'documentsdb_db_main' || '' }}
          _APP_DATABASE_VECTORSDB_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'vectorsdb_db_main' || '' }}
        run: |
          docker load --input /tmp/${{ env.IMAGE }}.tar
          docker compose pull --quiet --ignore-buildable
          docker compose up -d --quiet-pull --wait

      - name: Wait for Open Runtimes
        timeout-minutes: 3
        run: |
          while ! docker compose logs openruntimes-executor | grep -q "Executor is ready."; do
            echo "Waiting for Executor to come online"
            sleep 1
          done

      - name: Run tests
        uses: itznotabug/php-retry@v3
        with:
          max_attempts: 2
          retry_wait_seconds: 60
          timeout_minutes: 20
          job_id: ${{ job.check_run_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          test_dir: tests/e2e/Services/${{ matrix.service }}
          command: |
            SERVICE_PATH="/usr/src/code/tests/e2e/Services/${{ matrix.service }}"

            # Services that rely on sequential test method execution (shared static state)
            FUNCTIONAL_FLAG="--functional"
            case "${{ matrix.service }}" in
              Databases|TablesDB|Functions|Realtime|GraphQL|ProjectWebhooks) FUNCTIONAL_FLAG="" ;;
            esac

            docker compose exec -T \
              -e _APP_E2E_RESPONSE_FORMAT="${{ github.event.inputs.response_format }}" \
              appwrite vendor/bin/paratest --processes $(nproc) $FUNCTIONAL_FLAG "$SERVICE_PATH" --exclude-group abuseEnabled --exclude-group screenshots --log-junit tests/e2e/Services/${{ matrix.service }}/junit.xml

      - name: Failure Logs
        if: failure()
        run: |
          echo "=== Appwrite Logs ==="
          docker compose logs

  e2e_abuse:
    name: Tests / E2E / Abuse (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: [build, matrix]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJSON(needs.matrix.outputs.modes) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download Docker Image
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.IMAGE }}
          path: /tmp

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load and Start Appwrite
        timeout-minutes: 5
        env:
          _APP_OPTIONS_ABUSE: enabled
          _APP_DATABASE_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'database_db_main' || '' }}
          _APP_DATABASE_DOCUMENTSDB_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'documentsdb_db_main' || '' }}
          _APP_DATABASE_VECTORSDB_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'vectorsdb_db_main' || '' }}
        run: |
          docker load --input /tmp/${{ env.IMAGE }}.tar
          docker compose pull --quiet --ignore-buildable
          docker compose up -d --quiet-pull --wait

      - name: Run tests
        uses: itznotabug/php-retry@v3
        with:
          max_attempts: 2
          retry_wait_seconds: 60
          timeout_minutes: 15
          job_id: ${{ job.check_run_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          test_dir: tests/e2e
          command: >-
            docker compose exec -T
            -e _APP_E2E_RESPONSE_FORMAT="${{ github.event.inputs.response_format }}"
            appwrite test /usr/src/code/tests/e2e --group=abuseEnabled

      - name: Failure Logs
        if: failure()
        run: |
          echo "=== Appwrite Logs ==="
          docker compose logs

  e2e_screenshots:
    name: Tests / E2E / Screenshots (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: [build, matrix]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJSON(needs.matrix.outputs.modes) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Docker Image
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.IMAGE }}
          path: /tmp

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load and Start Appwrite
        timeout-minutes: 5
        env:
          _APP_DATABASE_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'database_db_main' || '' }}
          _APP_DATABASE_DOCUMENTSDB_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'documentsdb_db_main' || '' }}
          _APP_DATABASE_VECTORSDB_SHARED_TABLES: ${{ matrix.mode != 'dedicated' && 'vectorsdb_db_main' || '' }}
        run: |
          docker load --input /tmp/${{ env.IMAGE }}.tar
          docker compose pull --quiet --ignore-buildable
          docker compose up -d --quiet-pull --wait

      - name: Wait for Open Runtimes
        timeout-minutes: 3
        run: |
          while ! docker compose logs openruntimes-executor | grep -q "Executor is ready."; do
            echo "Waiting for Executor to come online"
            sleep 1
          done

      - name: Run tests
        uses: itznotabug/php-retry@v3
        with:
          max_attempts: 2
          retry_wait_seconds: 60
          timeout_minutes: 15
          job_id: ${{ job.check_run_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          test_dir: tests/e2e/Services/Sites
          command: >-
            docker compose exec -T
            -e _APP_E2E_RESPONSE_FORMAT="${{ github.event.inputs.response_format }}"
            appwrite test /usr/src/code/tests/e2e/Services/Sites --group=screenshots

      - name: Failure Logs
        if: failure()
        run: |
          echo "=== Appwrite Logs ==="
          docker compose logs

  benchmark:
    name: Benchmark
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download Docker Image
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.IMAGE }}
          path: /tmp

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load Appwrite image
        run: |
          docker load --input /tmp/${{ env.IMAGE }}.tar
          docker tag ${{ env.IMAGE }} ${{ env.IMAGE }}:after

      - name: Prepare benchmark before
        id: benchmark_before_prepare
        continue-on-error: true
        run: |
          git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}
          git worktree add --detach /tmp/appwrite-benchmark-before ${{ github.event.pull_request.base.sha }}
          docker build \
            --cache-from ${{ env.IMAGE }}:after \
            --target development \
            --build-arg DEBUG=false \
            --build-arg TESTING=true \
            --build-arg VERSION=dev \
            --tag ${{ env.IMAGE }}:before \
            /tmp/appwrite-benchmark-before

      - name: Start before Appwrite
        id: benchmark_before_start
        if: steps.benchmark_before_prepare.outcome == 'success'
        continue-on-error: true
        working-directory: /tmp/appwrite-benchmark-before
        run: |
          docker tag ${{ env.IMAGE }}:before ${{ env.IMAGE }}
          sed -i 's/traefik/localhost/g' .env
          docker compose up -d --wait --no-build

      - name: Benchmark before
        if: steps.benchmark_before_start.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          rm -f benchmark-before-summary.json benchmark-after-summary.json benchmark-before-samples.json benchmark-after-samples.json benchmark-before.txt benchmark.txt
          # Use the current benchmark script for both images so before/after differ only by the Appwrite image.
          docker run --rm -i --network host --user "$(id -u):$(id -g)" -v "$PWD:/scripts" -w /scripts ${{ env.K6_IMAGE }} run --quiet \
            --out json=benchmark-before-samples.json \
            -e APPWRITE_ENDPOINT=http://localhost/v1 \
            -e APPWRITE_MAILDEV_ENDPOINT=http://localhost:9503/email \
            -e APPWRITE_BENCHMARK_ITERATIONS=1 \
            -e APPWRITE_BENCHMARK_VUS=1 \
            -e APPWRITE_WORKER_TIMEOUT_MS=120000 \
            -e APPWRITE_BENCHMARK_SUMMARY_PATH=benchmark-before-summary.json \
            tests/benchmarks/http.js | tee benchmark-before.txt

      - name: Stop before Appwrite
        if: always()
        run: |
          if [ -d /tmp/appwrite-benchmark-before ]; then
            cd /tmp/appwrite-benchmark-before
            docker compose down -v || true
          fi

      - name: Start after Appwrite
        run: |
          docker tag ${{ env.IMAGE }}:after ${{ env.IMAGE }}
          sed -i 's/traefik/localhost/g' .env
          docker compose up -d --wait --no-build

      - name: Benchmark after
        id: benchmark_after
        continue-on-error: true
        run: |
          set -o pipefail
          docker run --rm -i --network host --user "$(id -u):$(id -g)" -v "$PWD:/scripts" -w /scripts ${{ env.K6_IMAGE }} run --quiet \
            --out json=benchmark-after-samples.json \
            -e APPWRITE_ENDPOINT=http://localhost/v1 \
            -e APPWRITE_MAILDEV_ENDPOINT=http://localhost:9503/email \
            -e APPWRITE_BENCHMARK_ITERATIONS=1 \
            -e APPWRITE_BENCHMARK_VUS=1 \
            -e APPWRITE_WORKER_TIMEOUT_MS=120000 \
            -e APPWRITE_BENCHMARK_PREVIOUS_SUMMARY_PATH=benchmark-before-summary.json \
            -e APPWRITE_BENCHMARK_SUMMARY_PATH=benchmark-after-summary.json \
            tests/benchmarks/http.js | tee benchmark.txt

      - name: Stop after Appwrite
        if: always()
        run: docker compose down -v

      - name: Prepare comment
        env:
          BENCHMARK_BASE_REF: ${{ github.event.pull_request.base.ref }}
          BENCHMARK_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          node <<'NODE' > benchmark-comment.txt
          const fs = require('fs');

          function readSummary(path, required = true) {
            if (!fs.existsSync(path)) {
              if (required) {
                throw new Error(`Missing benchmark summary: ${path}`);
              }
              return null;
            }

            try {
              return JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch (error) {
              throw new Error(`Invalid benchmark summary ${path}: ${error.message}`);
            }
          }

          function markdownText(value) {
            return String(value || '').replace(/[\r\n]/g, ' ').replace(/[&<>"']/g, (char) => {
              return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[char];
            });
          }

          function metricValue(data, metric, stat) {
            return data?.metrics?.[metric]?.values?.[stat] ?? null;
          }

          function formatNumber(value) {
            return Number(value).toFixed(2).replace(/\.?0+$/, '');
          }

          function formatValue(value, suffix = '') {
            return value === null ? 'n/a' : `${formatNumber(value)}${suffix}`;
          }

          function delta(beforeValue, afterValue, suffix = '') {
            if (beforeValue === null || afterValue === null) {
              return 'n/a';
            }

            const difference = Number((afterValue - beforeValue).toFixed(2));
            return `${difference > 0 ? '+' : ''}${formatNumber(difference)}${suffix}`;
          }

          function row(label, beforeValue, afterValue, suffix = '') {
            return `| ${label} | ${formatValue(beforeValue, suffix)} | ${formatValue(afterValue, suffix)} | ${delta(beforeValue, afterValue, suffix)} |`;
          }

          function detailValue(value, suffix = '') {
            return value === null ? 'n/a' : `${Number(value).toFixed(2)}${suffix}`;
          }

          function detailRow(after, label, metric, suffix = 'ms') {
            const values = after?.metrics?.[metric]?.values;
            if (!values) {
              return `| ${label} | n/a | n/a | n/a | n/a |`;
            }

            return `| ${label} | ${detailValue(values.avg ?? null, suffix)} | ${detailValue(values['p(90)'] ?? null, suffix)} | ${detailValue(values['p(95)'] ?? null, suffix)} | ${detailValue(values.max ?? null, suffix)} |`;
          }

          function readSamples(path) {
            if (!fs.existsSync(path)) {
              return [];
            }

            const contents = fs.readFileSync(path, 'utf8').trim();
            if (contents === '') {
              return [];
            }

            return contents
              .split('\n')
              .filter(Boolean)
              .flatMap((line) => {
                try {
                  return [JSON.parse(line)];
                } catch {
                  return [];
                }
              });
          }

          function topSamples(samples, metric, limit) {
            const byName = samples.reduce((result, sample) => {
              if (sample.metric !== metric || typeof sample.data?.value !== 'number') {
                return result;
              }

              const name = sample.data.tags?.name || 'unknown';
              const current = result.get(name);
              if (!current || sample.data.value > current.value) {
                result.set(name, { name, value: sample.data.value });
              }

              return result;
            }, new Map());

            return [...byName.values()]
              .sort((left, right) => right.value - left.value)
              .slice(0, limit);
          }

          function topSampleRows(samples) {
            if (samples.length === 0) {
              return ['| n/a | n/a |'];
            }

            return samples.map((sample) => {
              const name = markdownText(sample.name).replace(/\|/g, '\\|');
              return `| ${name} | ${detailValue(sample.value, 'ms')} |`;
            });
          }

          const before = readSummary('benchmark-before-summary.json', false);
          const after = readSummary('benchmark-after-summary.json', false);
          const afterSamples = readSamples('benchmark-after-samples.json');
          const baseRef = markdownText(process.env.BENCHMARK_BASE_REF || 'base');
          const headRef = markdownText(process.env.BENCHMARK_HEAD_REF || 'head');
          const topWaits = topSamples(afterSamples, 'appwrite_http_waiting', 3);

          const rows = [
            row('HTTP total p95', metricValue(before, 'appwrite_http_duration', 'p(95)'), metricValue(after, 'appwrite_http_duration', 'p(95)'), 'ms'),
            row('API endpoints p95', metricValue(before, 'appwrite_api_duration', 'p(95)'), metricValue(after, 'appwrite_api_duration', 'p(95)'), 'ms'),
            row('Database worker p95', metricValue(before, 'appwrite_worker_database_duration', 'p(95)'), metricValue(after, 'appwrite_worker_database_duration', 'p(95)'), 'ms'),
            row('TablesDB worker p95', metricValue(before, 'appwrite_worker_tables_duration', 'p(95)'), metricValue(after, 'appwrite_worker_tables_duration', 'p(95)'), 'ms'),
            row('Mail worker p95', metricValue(before, 'appwrite_worker_mails_duration', 'p(95)'), metricValue(after, 'appwrite_worker_mails_duration', 'p(95)'), 'ms'),
            row('Messaging worker p95', metricValue(before, 'appwrite_worker_messaging_duration', 'p(95)'), metricValue(after, 'appwrite_worker_messaging_duration', 'p(95)'), 'ms'),
          ];

          console.log('<!-- appwrite-benchmark-results -->');
          console.log('## :sparkles: Benchmark results');
          console.log();
          console.log(`Comparing ${baseRef} (before) to ${headRef} (after).`);
          console.log();
          if (before === null) {
            console.log('> Before benchmark did not complete; showing current branch metrics only.');
            console.log();
          }
          if (after === null) {
            console.log('> Current branch benchmark did not complete; showing available metrics only.');
            console.log();
          }
          console.log('| Metric | Before | After | Delta |');
          console.log('| --- | ---: | ---: | ---: |');
          console.log(rows.join('\n'));
          console.log();
          console.log('<details>');
          console.log('<summary><strong>Current run details</strong></summary>');
          console.log();
          console.log('<br>');
          console.log();
          console.log('| Scenario | Avg | P90 | P95 | Max |');
          console.log('| --- | ---: | ---: | ---: | ---: |');
          console.log(detailRow(after, 'HTTP total', 'appwrite_http_duration'));
          console.log(detailRow(after, 'API endpoints', 'appwrite_api_duration'));
          console.log(detailRow(after, 'Database worker schema jobs', 'appwrite_worker_database_duration'));
          console.log(detailRow(after, 'TablesDB worker schema jobs', 'appwrite_worker_tables_duration'));
          console.log(detailRow(after, 'Mail worker delivery', 'appwrite_worker_mails_duration'));
          console.log(detailRow(after, 'Messaging worker delivery', 'appwrite_worker_messaging_duration'));
          console.log();
          console.log('**Top 3 request waits**');
          console.log();
          console.log('| Request | Max wait |');
          console.log('| --- | ---: |');
          console.log(topSampleRows(topWaits).join('\n'));
          console.log();
          console.log('</details>');
          NODE

      - name: Save results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: benchmark-results
          path: |
            benchmark-before.txt
            benchmark.txt
            benchmark-before-summary.json
            benchmark-after-summary.json
            benchmark-before-samples.json
            benchmark-after-samples.json
          retention-days: 7

      - name: Find Comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: appwrite-benchmark-results

      - name: Find Legacy Comment
        if: github.event.pull_request.head.repo.full_name == github.repository && steps.fc.outputs.comment-id == ''
        uses: peter-evans/find-comment@v3
        id: legacy_fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Benchmark results

      - name: Comment on PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id || steps.legacy_fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: benchmark-comment.txt
          edit-mode: replace

      - name: Fail benchmark
        if: steps.benchmark_after.outcome == 'failure'
        run: exit 1
